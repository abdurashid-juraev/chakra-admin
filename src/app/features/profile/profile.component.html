<section class="mx-auto flex w-3/6 flex-col gap-5">
  <form class="flex gap-3">
    <p-iconfield class="w-full">
      <p-inputicon styleClass="pi pi-search" />
      <input [formControl]="name" type="text" pInputText placeholder="Enter..." class="w-full" />
    </p-iconfield>
    <p-button styleClass="px-4" (onClick)="addUser()"> + </p-button>
  </form>
  @if (users().length > 0) {
    <div>
      <p-table [value]="users()" stripedRows>
        <ng-template #header>
          <tr>
            <th>No</th>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
          </tr>
        </ng-template>
        <ng-template #body let-user>
          <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>
              <div class="flex justify-end gap-2">
                <p-button
                  (onClick)="edit(user.id)"
                  icon="pi pi-pencil"
                  severity="success"
                  [rounded]="true"
                  [rounded]="true"
                />
                <p-button
                  (onClick)="deleteBtn(user.id)"
                  icon="pi pi-trash"
                  severity="danger"
                  [rounded]="true"
                  [rounded]="true"
                />
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  } @else {
    <div class="py-4 text-center font-semibold">No data</div>
  }
</section>
