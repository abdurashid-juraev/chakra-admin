<table>
  <thead>
    <ng-container [ngTemplateOutlet]="theadTemplate()"></ng-container>
  </thead>
  <tbody>
    @for (item of data(); track item) {
      <tr>
        <ng-container
          [ngTemplateOutlet]="rowTemplate()"
          [ngTemplateOutletContext]="{
            $implicit: item,
            index: $index,
          }"
        ></ng-container>
      </tr>
    }
  </tbody>
</table>
